<head>

        .overlap-container { position: relative; height: 100px; }

        .btn2 { position: absolute; left: 20px; top: 20px; width: 100px; height: 50px; background: blue; opacity: 0.8; }

    </style>
</head>
<body>
    <h1>AAB Buggy Page</h1>
    <div class="overlap-container">
        <button class="btn1">Button 1</button>
        <button class="btn2">Button 2</button>

    <button class="clipped">I am clipped</button>
    <button id="errorBtn" onclick="throw new Error('User clicked error button')">Cause Error</button>
    <script>
        console.error("Initial load error");
    </script>
</body>
</html>
