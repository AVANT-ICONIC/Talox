<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Talox Test — Observe Target</title></head>
<body>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
  <main>
    <h1>Test Page</h1>
    <button id="primary-action">Place Order</button>
    <button id="secondary-action">Add to Cart</button>
    <form id="contact-form">
      <input id="name" type="text" placeholder="Your name" />
      <textarea id="message" placeholder="Your message"></textarea>
      <button type="submit">Send</button>
    </form>
    <div id="sent" style="display:none">Message sent!</div>
  </main>
  <script>
    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('sent').style.display = 'block';
    });
  </script>
</body>
</html>
