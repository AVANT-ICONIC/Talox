name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Only run unit tests that don't require a browser launch
      # Browser integration tests require a real Chrome install and are run manually
      - run: npx vitest run tests/core/HumanMouse.test.ts tests/core/RulesEngine.test.ts tests/core/ArtifactBuilder.test.ts tests/core/ProfileVault.test.ts tests/core/BugEngine.test.ts
